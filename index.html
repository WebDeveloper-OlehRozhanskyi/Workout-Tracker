<!doctype html>
<html lang="uk">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
   rel="icon"
   type="image/png"
   href="/favicon/favicon-96x96.png"
   sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link
   rel="apple-touch-icon"
   sizes="180x180"
   href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <title>Workout Tracker</title>
 </head>
 <body>
  <header class="header"></header>
  <main class="main">
   <section class="workout">
    <div class="workout__container">
     <h1 class="workout__title">Workout Tracker</h1>
     <details class="workout__details">
      <summary>Обладнання</summary>
      <table class="workout__equipment">
       <thead>
        <tr>
         <th>Назва</th>
         <th>Навантаження</th>
        </tr>
       </thead>
       <tbody>
        <tr>
         <td>Жовта</td>
         <td>1-5 кг</td>
        </tr>
        <tr>
         <td>Червона</td>
         <td>6-10 кг</td>
        </tr>
        <tr>
         <td>Зелена тонка</td>
         <td>11-19 кг</td>
        </tr>
        <tr>
         <td>Чорна</td>
         <td>12-17 кг</td>
        </tr>
        <tr>
         <td>Фіолетова</td>
         <td>17-26 кг</td>
        </tr>
        <tr>
         <td>Зелена широка</td>
         <td>26-36 кг</td>
        </tr>
        <tr>
         <td>Синя</td>
         <td>36-48 кг</td>
        </tr>
        <tr>
         <td>Жилет</td>
         <td>15 кг</td>
        </tr>
       </tbody>
      </table>
     </details>
     <details class="workout__details">
      <summary>Додати вправу</summary>
      <form class="workout__form">
       <label class="workout__label">
        Назва вправи:
        <input
         class="workout__input"
         type="text"
         name="exercise-name"
         required />
       </label>
       <label class="workout__label">
        Повтори:
        <input
         class="workout__input"
         type="number"
         name="exercise-reps"
         min="1"
         step="1"
         required />
       </label>

       <label class="workout__label">
        Навантаження:
        <input
         class="workout__input"
         type="text"
         name="exercise-load"
         required />
       </label>
       <label class="workout__label">
        Коментар:
        <input class="workout__input" type="text" name="exercise-note" />
       </label>
       <button class="workout__button" type="submit">Додати</button>
      </form>
     </details>
     <ul class="workout__exercises-list"></ul>
     <p class="workout__summary"></p>
    </div>
   </section>
  </main>
  <footer class="footer"></footer>
  <script type="module" src="./src/main.js"></script>
 </body>
</html>
